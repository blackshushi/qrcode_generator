# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.
# This workflow will download a prebuilt Ruby version, install dependencies and run tests with Rake
# For more information see: https://github.com/marketplace/actions/setup-ruby-jruby-and-truffleruby

name: QR Code Generator Runner

on:
  workflow_dispatch:
    inputs:
      message:
        description: 'String to be encoded in QR code'
        required: true
        type: string
      filename:
        description: 'Output filename (without extension)'
        required: true
        type: string
      format:
        description: 'Output format (png/svg)'
        required: true
        type: choice
        default: 'png'
        options:
          - png
          - svg

permissions:
  contents: read
  # Add if you need to upload artifacts
  actions: write

jobs:
  generate-qr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # MUST run before ruby/setup-ruby: bundler-cache runs `bundle install`, and rmagick compiles
      # against ImageMagick (MagickCore.pc from pkg-config).
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y imagemagick libmagickwand-dev libmagickcore-dev pkg-config

      # Ruby version comes from .ruby-version (must be >= 3.1 for Bundler 2.6.x in Gemfile.lock)
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      # Rake writes to tmp/ (see lib/tasks/runner.rake); CI checkouts may not include tmp/.
      - name: Generate QR Code
        id: generate
        run: |
          mkdir -p tmp
          bundle exec rake runner
        env:
          MESSAGE: ${{ inputs.message }}
          FILENAME: ${{ inputs.filename }}
          QR_FORMAT: ${{ inputs.format }}

      - name: Upload QR Code
        uses: actions/upload-artifact@v4
        with:
          name: qr-code
          path: tmp/${{ inputs.filename }}.*
          retention-days: 5
          if-no-files-found: error

      - name: Cleanup
        if: always()
        run: |
          rm -f "tmp/${{ inputs.filename }}.png" "tmp/${{ inputs.filename }}.svg"
